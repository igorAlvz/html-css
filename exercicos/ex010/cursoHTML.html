<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curso HTML</title>
    <link rel="shortcut icon" href="imagens/guana.ico" type="image/x-icon">
  </head>

  <style>
    body {
      background-color: black;
      color: rgb(253, 208, 7);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      text-align: center;
    }
  

    p {
      display: inline-block;
      text-align: center;
      background-color: rgb(255, 230, 0);
      width: 300px;
      font-size: 1.5em;
      color: black;
      font-weight: 900;
      padding: 10px;
      border-radius: 10px;
    }
    p:hover{
      background-color: rgb(250, 21, 71);
    }

    iframe{
      box-shadow: 5px 7px 13px rgb(255, 199, 13);
    
    }
  </style>

  <body>
    <h1>Curso HTML</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/epDCjksKMok?si=8x3mmzhChX58WkGy"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <br />
    <div>
      <a href="https://youtu.be/epDCjksKMok?si=BueN5LsWjgaStRb5" target="_blank"><p>Veja o curso completo</p></a>
    </div>
    <a href="index.html"><img src="imagens/voltar.png" alt="Icone Voltar" /></a>
  </body>
</html>
