<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<style>
    body{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    table{
        border-collapse: collapse;
    }
    th,td{
        border: 1px solid black;
        padding: 10px;
    }
    caption{
        font-weight: bolder;
        padding: 10px;
    }
    .amarelo{
        background-color:  rgb(204, 204, 121);
    }
    .verde{
        background-color: rgb(147, 196, 147);
    }

    .azul{
        background-color: rgb(61, 98, 179);
    }
</style>
<body>
    <h1>Exercício De Tabela</h1>

    <table>
        <colgroup>
            <col class="amarelo">
            <col class="verde" span="2">
            <col class="azul">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th>Nome</th>
            <th>Sexo</th>
            <th>Idade</th>
            <th>Profissão</th>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>M</td>
            <td>28</td>
            <td>Pedreiro</td>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Marta</td>
            <td>F</td>
            <td>39</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Flávio</td>
            <td>M</td>
            <td>28</td>
            <td>Denstista</td>
        </tr>
    </table>
</body>
</html>
