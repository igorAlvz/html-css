<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
</head>

<style>
    #container{
        height: 500px;
        width: 500px;
        background-color: blueviolet;
        position: relative;
    }

    #conteudo{
        height: 200px;
        width: 300px;
        background-color: black;
        position: absolute;
        right: 50%;
        bottom: 50%;
        transform: translate(50%,50%);
    }
</style>
<body>
    

    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
