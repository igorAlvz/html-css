<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
</head>
<body>
    <h1>Feedback/Contato</h1>

    <form action="cadastro.php" method="post">

        <P>
            <label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome" required>
        </P>

        <p>
            <label for="iassunto">Assunto:</label>
            <input type="text" name="assunto" id="iassunto" required>
        </p>

        <p>
            <label for="ifeed">Deixe aqui seu feedback</label>
            <textarea name="feed" id="ifeed" cols="30" rows="10"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
        </p>


    </form>


</body>
</html>
