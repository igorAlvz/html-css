<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form action="cadastro.php" method="post">
      <p>
        <label for="ilogin">Login:</label>
        <input type="email" name="login" id="ilogin" required />
      </p>

      <p>
        <label for="isenha">Senha:</label>
        <input type="password" name="senha" id="isenha" required />
      </p>

      <p>
        <input type="checkbox" name="conct" id="iconct" />
        <label for="iconct">Manter conectado</label>
        <input type="checkbox" name="lembrar" id="ilembrar" />
        <label for="ilembrar">Lembrar-me</label>
      </p>

      <p>
        <input type="submit" value="Entrar" />
      </p>
    </form>
  </body>
</html>
