<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaga de emprego</title>
</head>
<body>
    <h1>Vaga para Analista de dados</h1>
    <form action="vaga.php" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" placeholder="Nome completo" required>
            </p>

            <p>
                <label for="iage">Idade:</label>
                <input type="number" name="age" id="iage" min="18" max="50" value="18" required>
            </p>
        </fieldset>

        <fieldset>
            <legend>Experiência</legend>
            <p>Linguagens</p>
            <input type="checkbox" name="py" id="ipy">
            <label for="ipy">Python</label>

            <input type="checkbox" name="php" id="iphp">
            <label for="iphp">Php</label>

            <input type="checkbox" name="js" id="ijs">
            <label for="ijs">JavaScript</label>

            <p>Já trabalhou na área?</p>
            <input type="radio" name="exp" id="sim" value="sim" >
            <label for="sim">Sim</label>
            <input type="radio" name="exp" id="nao" value="nao" >
            <label for="nao">Não</label>
        </fieldset>

        <fieldset>
            <legend>Vaga desejada</legend>
            <label for="ivaga">Selecione sua vaga de interesse</label> <br>
            <select name="vaga" id="ivaga" required>
                <option value="" disabled selected> Selecione...</option>
                <option value="junior">Analista junior</option>
                <option value="pleno">Analista pleno</option>
                <option value="senior">Analista senior</option>
            </select>

        </fieldset>

        <fieldset>
            <legend>Dados para contato</legend>

            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" placeholder="(xx) Xxxxx-xxxx" pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" required>
            </p>

            <p>
                <label for="iemail">E-mail</label>
                <input type="email" name="email" id="iemail" placeholder="seuemail@dominio.com" required>
            </p>

        </fieldset>
        <p>
            <input type="hidden" name="cvaga">
        </p>

        <p>
            <input type="submit" value="Enviar">
        </p>

    </form>
</body>
</html>
