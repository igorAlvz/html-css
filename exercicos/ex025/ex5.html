<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entregas</title>
  </head>
  <body>
    <h1>Entrega</h1>
    <form action="cadastro.php" method="post">
      <fieldset>
        <legend>Endereço para entrega</legend>

        <p>
          <label for="irua">Rua</label>
          <input type="text" name="rua" id="irua" required />
        </p>

        <p>
          <label for="ibairro">Bairro</label>
          <input type="text" name="bairro" id="ibairro" required />
        </p>

        <p>
          <label for="uf">UF</label>

          <select name="uf" id="uf" required>
            <option value="" disabled selected>Selecione...</option>

            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="RN">Rio Grande do Norte</option>
          </select>
        </p>
        <p>
          <label for="icid">Cidade</label>
          <input type="text" name="cid" id="icid" required />
        </p>
      </fieldset>
    </form>
  </body>
</html>
