<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadasto.php" method="post" autocomplete="on">

        <p>
            <label for="iuser">
                Usuário:
                </label>
                <input type="text" name="user" id="iuser">
            
        </p>
        <p>
            <label for="isenha">
                Senha:
            </label>
            <input type="password" name="senha" id="isenha" required minlength="5" maxlength="8" size="8" placeholder="5 caracteres" autocomplete="current-password">
        </p>

        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
    
</body>
</html>
