<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get">
        <fieldset>
            <legend>Sexo</legend>
            <label for="imas">Masculino</label>
            <input type="radio" name="sexo" id="imas" value="M"> 
            <label for="ifem">Feminino</label>
            <input type="radio" name="sexo" id="ifem" value="F">
        </fieldset>

        <fieldset>
            <legend>Esportes</legend>
            <label for="ibas">Basquete</label>
            <input type="checkbox" name="bas" id="ibas"> <br>
            <label for="ifut">Futebol</label>
            <input type="checkbox" name="fut" id="ifut"> <br>
            <label for="itenis">Tênis</label>
            <input type="checkbox" name="tenis" id="itenis"> <br>
            <label for="ivolei">Vôlei</label>
            <input type="checkbox" name="volei" id="ivolei"> <br>
            <label for="ifres">Frescoboll</label>
            <input type="checkbox" name="fres" id="ifres">
        </fieldset>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
